<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant Tech Blue Gradient -->
    <linearGradient id="gearGradFav" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052D4" />
      <stop offset="50%" stop-color="#4364F7" />
      <stop offset="100%" stop-color="#00C6FF" />
    </linearGradient>

    <!-- Fiery Orange Gradient -->
    <linearGradient id="wrenchGradFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF512F" />
      <stop offset="100%" stop-color="#F09819" />
    </linearGradient>

    <!-- Harder Drop Shadow for Dark Mode Base -->
    <filter id="dark-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="6" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <!-- Wrench Base Shape Definition -->
    <g id="wrenchShapeFav">
      <circle cx="150" cy="45" r="36" />
      <rect x="135" y="65" width="30" height="170" rx="6" />
      <rect x="146" y="80" width="8" height="140" rx="4" fill="#FFFFFF" opacity="0.3" />
      <circle cx="150" cy="255" r="32" />
    </g>

    <!-- Mask to punch holes -->
    <mask id="wrenchMaskFav" maskUnits="userSpaceOnUse">
      <rect x="-100" y="-100" width="600" height="600" fill="white" />
      <rect x="133" y="-10" width="34" height="60" rx="4" fill="black" />
      <circle cx="150" cy="255" r="16" fill="black" />
      <circle cx="150" cy="150" r="14" fill="black" />
    </mask>
  </defs>

  <!-- App Icon Base Background -->
  <rect width="512" height="512" rx="110" fill="#090E17" />
  
  <!-- Subtle Outer Glow -->
  <circle cx="256" cy="256" r="150" fill="#4364F7" opacity="0.15" filter="blur(10px)" />

  <!-- Center and Scale the Logo Mark -->
  <g transform="translate(-14, -14) scale(1.8)" filter="url(#dark-shadow)">
    
    <!-- GEAR / OS NODE LAYER -->
    <g transform="translate(0, 6)">
      <circle cx="150" cy="150" r="82" stroke="#000712" stroke-width="20" stroke-dasharray="20 44.4" stroke-linecap="round" fill="none" />
      <circle cx="150" cy="150" r="66" stroke="#000712" stroke-width="16" fill="none" />
      <circle cx="150" cy="150" r="30" stroke="#000712" stroke-width="8" fill="none" />
    </g>

    <g>
      <circle cx="150" cy="150" r="82" stroke="url(#gearGradFav)" stroke-width="20" stroke-dasharray="20 44.4" stroke-linecap="round" fill="none" />
      <circle cx="150" cy="150" r="66" stroke="url(#gearGradFav)" stroke-width="16" fill="none" />
      <circle cx="150" cy="150" r="30" stroke="url(#gearGradFav)" stroke-width="8" fill="none" />
      <circle cx="150" cy="150" r="14" fill="#00C6FF" />
    </g>

    <!-- WRENCH / TORQUE LAYER -->
    <g transform="translate(0, 6)">
      <use href="#wrenchShapeFav" transform="rotate(45 150 150)" fill="#3D000A" mask="url(#wrenchMaskFav)" />
    </g>

    <use href="#wrenchShapeFav" transform="rotate(45 150 150)" fill="url(#wrenchGradFav)" mask="url(#wrenchMaskFav)" />
  </g>
</svg>
